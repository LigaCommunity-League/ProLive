<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Full Screen YouTube Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

<body>

<div class="video-container">
    <iframe 
        src="https://www.youtube.com/embed/Dm0Kf-trBtc?autoplay=1&mute=1&controls=1&rel=0&modestbranding=1"
        title="YouTube video player"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
