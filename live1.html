<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Fullscreen Player</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html, body {
        height: 100%;
        width: 100%;
        overflow: hidden;
        background: black;
    }

    iframe {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: none;
    }
</style>
</head>
<body>

<iframe 
    src="https://www.youtube.com/embed/AzY0eqML1Co?autoplay=1&controls=0&modestbranding=1&rel=0&fs=0&disablekb=1"
    allow="autoplay; encrypted-media"
    allowfullscreen>
</iframe>

</body>
</html>
