<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen Stream</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    .stream-container {
      width: 100vw;
      height: 100vh;
    }

    .stream-container iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="stream-container">
    <iframe
      id="streamFrame"
      src="https://live.baranewssumsel.online/albaplayer/bein22/?serv=0"
      allow="autoplay; encrypted-media"
      allowfullscreen
      referrerpolicy="no-referrer">
    </iframe>
  </div>
</body>
</html>
